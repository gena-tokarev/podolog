# Nginx site configuration for a Next.js server running on the same host.
# Install this file under /etc/nginx/sites-available/ and enable it from
# /etc/nginx/sites-enabled/ (or include it from nginx.conf on other systems).

upstream podolog_nextjs {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # Replace `_` with the production domain after DNS is configured.
    server_name _;
    server_tokens off;

    # Keep oversized or slow requests away from the Node.js process.
    client_max_body_size 10m;
    client_body_timeout 15s;
    client_header_timeout 15s;

    location / {
        proxy_pass http://podolog_nextjs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Preserve App Router streaming instead of buffering the response.
        proxy_buffering off;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
