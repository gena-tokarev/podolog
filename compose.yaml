services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_BOOKSY_URL: ${NEXT_PUBLIC_BOOKSY_URL}
        NEXT_PUBLIC_FACEBOOK_URL: ${NEXT_PUBLIC_FACEBOOK_URL}
        NEXT_PUBLIC_INSTAGRAM_URL: ${NEXT_PUBLIC_INSTAGRAM_URL}
    restart: unless-stopped
    init: true
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/pl').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./deploy/nginx/templates:/etc/nginx/site-templates:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    command:
      - /bin/sh
      - -c
      - |
        if [ -f "/etc/letsencrypt/live/$${DOMAIN}/fullchain.pem" ]; then
          envsubst '$$DOMAIN' < /etc/nginx/site-templates/https.conf.template > /etc/nginx/conf.d/default.conf
        else
          envsubst '$$DOMAIN' < /etc/nginx/site-templates/http.conf.template > /etc/nginx/conf.d/default.conf
        fi
        while :; do sleep 6h; nginx -s reload; done &
        exec nginx -g 'daemon off;'

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    depends_on:
      nginx:
        condition: service_started
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh
    command:
      - -c
      - |
        trap exit TERM
        while :; do
          certbot renew --webroot --webroot-path=/var/www/certbot --quiet
          sleep 12h & wait $${!}
        done

volumes:
  letsencrypt:
  certbot_www:
